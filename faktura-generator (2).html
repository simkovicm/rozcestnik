<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generátor faktur</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
<style>
:root {
  --black: #111111;
  --gray: #555555;
  --light-gray: #999999;
  --border: #cccccc;
  --bg: #e8e8e8;
  --white: #ffffff;
  --sidebar-bg: #1e1e2e;
  --sidebar-fg: #cdd6f4;
  --sidebar-muted: #6c7086;
  --sidebar-accent: #89b4fa;
  --sidebar-input-bg: rgba(255,255,255,0.07);
  --sidebar-input-border: rgba(255,255,255,0.12);
  --danger: #c0392b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--black);
  min-height: 100vh;
  display: grid;
  grid-template-columns: 400px 1fr;
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  background: var(--sidebar-bg);
  color: var(--sidebar-fg);
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 28px 24px 24px;
  scrollbar-width: thin;
  scrollbar-color: #313244 transparent;
}

.logo {
  font-family: 'Source Serif 4', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--white);
  letter-spacing: -0.3px;
  margin-bottom: 2px;
}
.logo span { color: var(--sidebar-accent); }
.logo-sub {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sidebar-muted);
  margin-bottom: 24px;
}

.tabs {
  display: flex;
  gap: 3px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 24px;
}
.tab {
  flex: 1;
  padding: 7px 4px;
  border: none;
  background: transparent;
  color: var(--sidebar-muted);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.18s;
}
.tab.active {
  background: var(--sidebar-accent);
  color: #1e1e2e;
}
.tab:not(.active):hover { color: var(--sidebar-fg); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.sec-label {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sidebar-muted);
  margin: 20px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sec-label:first-child { margin-top: 0; }

.field { margin-bottom: 11px; }
.field label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--sidebar-muted);
  margin-bottom: 4px;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--sidebar-input-bg);
  border: 1px solid var(--sidebar-input-border);
  border-radius: 6px;
  padding: 8px 10px;
  color: var(--sidebar-fg);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--sidebar-accent);
}
.field textarea { resize: vertical; min-height: 52px; line-height: 1.5; }
.field select option { background: #2a2a3e; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* Odběratel selector */
.odberatel-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 12px;
}
.odberatel-bar select {
  flex: 1;
  background: var(--sidebar-input-bg);
  border: 1px solid var(--sidebar-input-border);
  border-radius: 6px;
  padding: 7px 10px;
  color: var(--sidebar-fg);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}
.odberatel-bar select:focus { border-color: var(--sidebar-accent); }
.icon-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--sidebar-input-border);
  background: var(--sidebar-input-bg);
  border-radius: 6px;
  color: var(--sidebar-muted);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--sidebar-accent); color: var(--sidebar-accent); }
.icon-btn.danger:hover { border-color: #f38ba8; color: #f38ba8; }

/* Upload button */
.btn-upload {
  width: 100%;
  margin-bottom: 14px;
  padding: 10px 12px;
  background: rgba(137,180,250,0.08);
  color: var(--sidebar-accent);
  border: 1.5px dashed rgba(137,180,250,0.35);
  border-radius: 7px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-upload:hover {
  background: rgba(137,180,250,0.14);
  border-color: var(--sidebar-accent);
}
.btn-upload.loading {
  pointer-events: none;
  opacity: 0.6;
}
.btn-upload .upload-icon { font-size: 15px; }

/* Import status toast */
.import-toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 14px 20px;
  border-radius: 8px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  font-weight: 600;
  z-index: 200;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.25s;
  pointer-events: none;
  max-width: 380px;
}
.import-toast.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}
.import-toast.success {
  background: #1e3a2f;
  color: #a6e3a1;
  border: 1px solid rgba(166,227,161,0.25);
}
.import-toast.error {
  background: #3a1e1e;
  color: #f38ba8;
  border: 1px solid rgba(243,139,168,0.25);
}
.import-toast.info {
  background: #1e2a3a;
  color: #89b4fa;
  border: 1px solid rgba(137,180,250,0.25);
}

/* Buttons */
.btn-primary {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: var(--sidebar-accent);
  color: #1e1e2e;
  border: none;
  border-radius: 7px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-primary:hover { background: #74c7ec; transform: translateY(-1px); }

.btn-secondary {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  background: transparent;
  color: var(--sidebar-fg);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 7px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-secondary:hover { border-color: var(--sidebar-fg); background: rgba(255,255,255,0.04); }

.btn-ghost {
  width: 100%;
  margin-top: 16px;
  padding: 8px;
  background: transparent;
  color: #6c7086;
  border: 1px solid rgba(108,112,134,0.3);
  border-radius: 6px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-ghost:hover { color: #f38ba8; border-color: #f38ba8; }

/* History */
.history-list { display: flex; flex-direction: column; gap: 6px; }
.history-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 7px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.history-item:hover { border-color: var(--sidebar-accent); background: rgba(137,180,250,0.08); }
.h-no { font-size: 12px; color: var(--sidebar-fg); margin-bottom: 2px; font-weight: 600; }
.h-name { font-size: 11px; color: var(--sidebar-muted); margin-bottom: 2px; }
.h-amount { font-size: 11px; color: var(--sidebar-accent); }
.history-empty { font-size: 12px; color: var(--sidebar-muted); text-align: center; padding: 20px 0; }

/* ═══ PREVIEW ═══ */
.preview-pane {
  background: var(--bg);
  padding: 40px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.preview-empty {
  margin: auto;
  text-align: center;
  color: var(--light-gray);
}
.preview-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.35; }
.preview-empty h2 {
  font-family: 'Source Serif 4', serif;
  font-size: 22px;
  font-weight: 300;
  opacity: 0.5;
  margin-bottom: 6px;
}
.preview-empty p { font-size: 12px; opacity: 0.45; letter-spacing: 0.5px; }

/* ═══ FAKTURA (PDF styl) ═══ */
.invoice {
  background: var(--white);
  width: 100%;
  max-width: 740px;
  padding: 56px 60px;
  box-shadow: 0 2px 32px rgba(0,0,0,0.15);
  animation: fadeUp 0.25s ease;
  font-family: 'Source Sans 3', sans-serif;
  color: var(--black);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* NADPIS */
.inv-title-row {
  text-align: center;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--black);
}
.inv-title {
  font-family: 'Source Serif 4', serif;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* STRANY */
.inv-parties {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.inv-party-head {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  color: var(--black);
}
.inv-party-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 5px;
  line-height: 1.3;
}
.inv-party-detail {
  font-size: 12.5px;
  line-height: 1.75;
  color: var(--gray);
}

/* PŘEDMĚT */
.inv-subject {
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.inv-subject-row {
  font-size: 13px;
  line-height: 1.6;
}
.inv-subject-row strong { color: var(--black); }

/* CELKEM */
.inv-total-box {
  background: #f2f2f2;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.inv-total-label {
  font-size: 14px;
  font-weight: 700;
}
.inv-total-value {
  font-family: 'Source Serif 4', serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

/* PLATBA INFO */
.inv-payment-note {
  font-size: 12.5px;
  color: var(--gray);
  margin-bottom: 6px;
}
.inv-dph-note {
  font-size: 12.5px;
  font-weight: 700;
  margin-bottom: 20px;
}

/* DATUM ŘÁDKY */
.inv-dates-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 16px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.inv-date-item label {
  display: block;
  font-size: 11px;
  color: var(--light-gray);
  margin-bottom: 3px;
}
.inv-date-item strong {
  font-size: 14px;
  font-weight: 700;
}

/* PODPIS */
.inv-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.inv-footer-left {
  font-size: 12.5px;
  color: var(--gray);
}
.inv-footer-right {
  text-align: right;
}
.inv-signature-name {
  font-family: 'Source Serif 4', serif;
  font-size: 22px;
  font-style: italic;
  font-weight: 300;
  color: var(--black);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}
.inv-signature-label {
  font-size: 11px;
  color: var(--gray);
}

/* PRINT */
@media print {
  body { display: block; background: white; }
  .sidebar { display: none !important; }
  .preview-pane { padding: 0; background: white; }
  .preview-empty { display: none !important; }
  .invoice {
    box-shadow: none;
    max-width: 100%;
    padding: 32px 40px;
    animation: none;
  }
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #2a2a3e;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 28px;
  width: 380px;
  max-width: 95vw;
  transform: translateY(8px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal h3 {
  font-family: 'Source Serif 4', serif;
  font-size: 16px;
  color: var(--sidebar-fg);
  margin-bottom: 20px;
}
.modal .field label { color: var(--sidebar-muted); }
.modal .field input, .modal .field textarea, .modal .field select {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--sidebar-fg);
}
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-actions .btn-primary { margin-top: 0; flex: 1; }
.btn-cancel {
  flex: 1;
  padding: 11px;
  background: transparent;
  color: var(--sidebar-muted);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 7px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
}
.btn-cancel:hover { color: var(--sidebar-fg); }

/* Import confirm modal */
.import-fields {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
  max-height: 300px;
  overflow-y: auto;
}
.import-field-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 6px;
}
.import-field-row input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--sidebar-accent);
  flex-shrink: 0;
}
.import-field-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--sidebar-muted);
  min-width: 70px;
}
.import-field-value {
  font-size: 13px;
  color: var(--sidebar-fg);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Scrollbar sidebar */
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #313244; border-radius: 2px; }
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <div class="logo">Faktu<span>rant</span></div>
  <div class="logo-sub">Generátor faktur</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('nova', this)">Nová</button>
    <button class="tab" onclick="switchTab('profil', this)">Profil</button>
    <button class="tab" onclick="switchTab('historie', this)">Historie</button>
  </div>

  <!-- ── TAB: NOVÁ FAKTURA ── -->
  <div id="tab-nova" class="tab-panel active">

    <div class="sec-label">Odběratel</div>

    <button class="btn-upload" id="btn-import-pdf" onclick="document.getElementById('pdf-input').click()">
      <span class="upload-icon">📄</span> Načíst z předchozí faktury (PDF)
    </button>
    <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="handlePdfImport(event)">

    <div class="odberatel-bar">
      <select id="odberatel-select" onchange="loadOdberatel(this.value)">
        <option value="">— Vyberte uloženého odběratele —</option>
      </select>
      <button class="icon-btn" title="Uložit jako nového odběratele" onclick="openSaveOdberatel()">＋</button>
      <button class="icon-btn danger" title="Smazat odběratele" onclick="deleteOdberatel()">×</button>
    </div>

    <div class="field">
      <label>Název / Jméno</label>
      <input type="text" id="zak-nazev" placeholder="Firma s.r.o.">
    </div>
    <div class="field">
      <label>Adresa</label>
      <textarea id="zak-adresa" placeholder="Ulice 123&#10;110 00 Praha"></textarea>
    </div>
    <div class="row2">
      <div class="field">
        <label>IČ</label>
        <input type="text" id="zak-ico" placeholder="12345678">
      </div>
      <div class="field">
        <label>DIČ</label>
        <input type="text" id="zak-dic" placeholder="CZ12345678">
      </div>
    </div>

    <div class="sec-label">Faktura</div>

    <div class="field">
      <label>Předmět plnění</label>
      <textarea id="fakt-popis" placeholder="Účast na konferenci, konzultační služby…"></textarea>
    </div>
    <div class="row2">
      <div class="field">
        <label>Částka (Kč)</label>
        <input type="number" id="fakt-castka" placeholder="15000">
      </div>
      <div class="field">
        <label>Splatnost (dní)</label>
        <input type="number" id="fakt-splatnost" value="28">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Datum vystavení</label>
        <input type="date" id="fakt-datum">
      </div>
      <div class="field">
        <label>Číslo faktury</label>
        <input type="text" id="fakt-cislo" placeholder="auto">
      </div>
    </div>
    <div class="field">
      <label>Variabilní symbol</label>
      <input type="text" id="fakt-vs" placeholder="auto">
    </div>

    <button class="btn-primary" onclick="generateInvoice()">▶ Náhled faktury</button>
    <button class="btn-secondary" onclick="printInvoice()">⎙ Tisk / Uložit PDF</button>
    <button class="btn-secondary" id="btn-email" onclick="copyEmailText()" style="margin-top:6px;" disabled>✉ Kopírovat průvodní e-mail</button>
  </div>

  <!-- ── TAB: PROFIL DODAVATELE ── -->
  <div id="tab-profil" class="tab-panel">

    <div class="sec-label">Základní údaje</div>
    <div class="field"><label>Jméno / Název</label><input type="text" id="dod-jmeno" placeholder="Jan Novák"></div>
    <div class="field"><label>Adresa</label><textarea id="dod-adresa" placeholder="Ulice 1&#10;Praha 1, 110 00"></textarea></div>
    <div class="row2">
      <div class="field"><label>IČO</label><input type="text" id="dod-ico" placeholder="19871694"></div>
      <div class="field"><label>Rodné číslo</label><input type="text" id="dod-rc" placeholder="820114/3038"></div>
    </div>
    <div class="field"><label>Datová schránka</label><input type="text" id="dod-ds" placeholder="a3xkpvs"></div>

    <div class="sec-label">Kontakt &amp; platba</div>
    <div class="field"><label>Číslo účtu</label><input type="text" id="dod-ucet" placeholder="2402 140 507 / 2010"></div>
    <div class="field"><label>Telefon</label><input type="text" id="dod-telefon" placeholder="+420 777 000 000"></div>
    <div class="field"><label>E-mail</label><input type="text" id="dod-email" placeholder="jan@example.cz"></div>
    <div class="field"><label>Město (pro podpis)</label><input type="text" id="dod-mesto" placeholder="Praha"></div>

    <div class="sec-label">Nastavení</div>
    <div class="row2">
      <div class="field">
        <label>Neplátce DPH</label>
        <select id="dod-dph">
          <option value="1">Ano</option>
          <option value="0">Ne (plátce)</option>
        </select>
      </div>
      <div class="field">
        <label>Start číslování</label>
        <input type="number" id="dod-start" value="1">
      </div>
    </div>
    <div class="field">
      <label>Formát čísla faktury</label>
      <input type="text" id="dod-format" value="{rok}{poradi2}">
      <div style="font-size:10px;color:#6c7086;margin-top:4px;">{rok} {poradi} {poradi2} {poradi3}</div>
    </div>

    <button class="btn-primary" onclick="saveProfile()">✓ Uložit profil</button>
  </div>

  <!-- ── TAB: HISTORIE ── -->

// ── PDF IMPORT ────────────────────────────────────────────────
let pendingImportData = null;

async function handlePdfImport(event) {
  const file = event.target.files[0];
  if (!file) return;

  const btn = document.getElementById('btn-import-pdf');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="upload-icon">⏳</span> Načítám PDF…';

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const lines = [];
      let lastY = null;
      for (const item of content.items) {
        if (lastY !== null && Math.abs(item.transform[5] - lastY) > 3) {
          lines.push('\n');
        }
        lines.push(item.str);
        lastY = item.transform[5];
      }
      fullText += lines.join('') + '\n';
    }

    const parsed = parseFaktura(fullText);

    if (!parsed.nazev && !parsed.ico) {
      showToast('Nepodařilo se rozpoznat údaje odběratele z PDF.', 'error');
      resetUploadBtn();
      return;
    }

    // Zobrazíme modal s nalezenými údaji
    pendingImportData = parsed;
    showImportModal(parsed);

  } catch (err) {
    console.error('PDF import error:', err);
    showToast('Chyba při čtení PDF: ' + err.message, 'error');
  }

  resetUploadBtn();
}

function resetUploadBtn() {
  const btn = document.getElementById('btn-import-pdf');
  btn.classList.remove('loading');
  btn.innerHTML = '<span class="upload-icon">📄</span> Načíst z předchozí faktury (PDF)';
  document.getElementById('pdf-input').value = '';
}

function parseFaktura(text) {
  const result = {
    nazev: '',
    adresa: '',
    ico: '',
    dic: '',
    predmet: '',
    castka: '',
  };

  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // Najdeme sekci "Odběratel:" — vše mezi "Odběratel:" a dalším klíčovým slovem
  let odberatelStart = -1;
  let odberatelEnd = lines.length;

  for (let i = 0; i < lines.length; i++) {
    const low = lines[i].toLowerCase();
    if (low.includes('odběratel')) {
      odberatelStart = i;
    }
    if (odberatelStart >= 0 && i > odberatelStart) {
      if (low.includes('předmět') || low.includes('částka') || low.includes('fakturuji') || low.includes('celkem')) {
        odberatelEnd = i;
        break;
      }
    }
  }

  if (odberatelStart >= 0) {
    const odberatelLines = lines.slice(odberatelStart + 1, odberatelEnd);
    const addrLines = [];

    for (const line of odberatelLines) {
      // IČ
      const icMatch = line.match(/IČ[O]?\s*:?\s*(\d{6,8})/i);
      if (icMatch) { result.ico = icMatch[1]; continue; }

      // DIČ
      const dicMatch = line.match(/DIČ\s*:?\s*(CZ\d{6,10})/i);
      if (dicMatch) { result.dic = dicMatch[1]; continue; }

      // Přeskočit prázdné a labely
      if (/^(odběratel|vystavitel|dodavatel)\s*:?\s*$/i.test(line)) continue;

      addrLines.push(line);
    }

    // První neprázdný řádek = název, zbytek = adresa
    if (addrLines.length > 0) {
      result.nazev = addrLines[0];
      if (addrLines.length > 1) {
        result.adresa = addrLines.slice(1).join('\n');
      }
    }
  }

  // Předmět služby
  for (let i = 0; i < lines.length; i++) {
    const match = lines[i].match(/Předmět\s+služby\s*:?\s*(.*)/i);
    if (match && match[1].trim()) {
      result.predmet = match[1].trim();
    }
  }

  // Částka — hledáme "Fakturuji k úhradě" nebo "Částka:"
  for (const line of lines) {
    // Částka z řádku s "Částka:" 
    const castkaMatch = line.match(/Částka\s*:?\s*([\d\s.,]+)\s*Kč/i);
    if (castkaMatch) {
      result.castka = castkaMatch[1].replace(/\s/g, '').replace(',', '.');
    }
  }

  // Fallback: IČ a DIČ kdekoliv v textu po sekci odběratel
  if (!result.ico) {
    const fullText = lines.join(' ');
    // Hledáme IČ v sekci odběratele
    const odberatelText = lines.slice(odberatelStart, odberatelEnd).join(' ');
    const icFallback = odberatelText.match(/IČ[O]?\s*:?\s*(\d{6,8})/i);
    if (icFallback) result.ico = icFallback[1];
  }
  if (!result.dic) {
    const odberatelText = lines.slice(odberatelStart, odberatelEnd).join(' ');
    const dicFallback = odberatelText.match(/DIČ\s*:?\s*(CZ\d{6,10})/i);
    if (dicFallback) result.dic = dicFallback[1];
  }

  return result;
}

    switch (key) {
      case 'nazev':
        document.getElementById('zak-nazev').value = d.nazev;
        count++;
        break;
      case 'adresa':
        document.getElementById('zak-adresa').value = d.adresa;
        count++;
        break;
      case 'ico':
        document.getElementById('zak-ico').value = d.ico;
        count++;
        break;
      case 'dic':
        document.getElementById('zak-dic').value = d.dic;
        count++;
        break;
      case 'predmet':
        document.getElementById('fakt-popis').value = d.predmet;
        count++;
        break;
      case 'castka':

  showToast(`Načteno ${count} ${count === 1 ? 'pole' : count < 5 ? 'pole' : 'polí'} z faktury.`, 'success');
}

// ── ČÍSLOVÁNÍ ─────────────────────────────────────────────────
function nextInvoiceNo(datum) {
  const p   = getProfile();
  const rok = new Date(datum).getFullYear();
  const fmt = p.format || '{rok}{poradi2}';
  const start = p.startPoradi || 1;
  const last  = getCounter(rok);
  const poradi = last === null ? start : last + 1;
  const cislo = fmt
    .replace('{rok}', rok)
    .replace('{poradi3}', String(poradi).padStart(3,'0'))
    .replace('{poradi2}', String(poradi).padStart(2,'0'))
    .replace('{poradi}',  String(poradi));
  return { cislo, rok, poradi };
}

// ── FORMAT HELPERS ────────────────────────────────────────────
function fmtDate(s) {
  const d = new Date(s);
  return d.toLocaleDateString('cs-CZ', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function fmtCzk(n) {
  return Number(n).toLocaleString('cs-CZ') + ' Kč';
}
function escH(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── GENEROVÁNÍ ────────────────────────────────────────────────
function generateInvoice() {
  const stored = getProfile();
  const p = stored.jmeno ? stored : DEFAULT_PROFILE;

  const zakNazev  = document.getElementById('zak-nazev').value.trim();
  const zakAdresa = document.getElementById('zak-adresa').value.trim();
  const zakIco    = document.getElementById('zak-ico').value.trim();
  const zakDic    = document.getElementById('zak-dic').value.trim();
  const popis     = document.getElementById('fakt-popis').value.trim();
  const castka    = parseFloat(document.getElementById('fakt-castka').value);
  const datum     = document.getElementById('fakt-datum').value;
  const splatnost = parseInt(document.getElementById('fakt-splatnost').value) || 28;

  if (!zakNazev || !popis || isNaN(castka) || !datum) {
    alert('Vyplňte prosím: odběratele, předmět, částku a datum.');
    return;
  }

  let cisloInput = document.getElementById('fakt-cislo').value.trim();
  let vsInput    = document.getElementById('fakt-vs').value.trim();
  let nxt = null;

  if (!cisloInput) { nxt = nextInvoiceNo(datum); cisloInput = nxt.cislo; }
  if (!vsInput)    { vsInput = cisloInput; }

  const datumSpl = new Date(datum);
  datumSpl.setDate(datumSpl.getDate() + splatnost);
  const datumSplaStr = datumSpl.toISOString().slice(0,10);

  const inv = {
    id: Date.now(),
    cislo: cisloInput,
    datum,
    datumSplatnosti: datumSplaStr,
    vs: vsInput,
    zakNazev, zakAdresa, zakIco, zakDic,
    popis, castka,
    dodavatel: { ...p },
  };

  const hist = getHistory();
  hist.unshift(inv);
  saveHistoryLS(hist);
  if (nxt) setCounter(nxt.rok, nxt.poradi);

  renderInvoiceHTML(inv);

  // Uložíme data pro e-mail a aktivujeme tlačítko
  lastGeneratedInvoice = inv;
  document.getElementById('btn-email').disabled = false;
}

    <div class="inv-dates-row">
      <div class="inv-date-item">
        <label>Datum vystavení:</label>
        <strong>${fmtDate(inv.datum)}</strong>
      </div>
      <div class="inv-date-item">
        <label>Datum splatnosti:</label>
        <strong>${fmtDate(inv.datumSplatnosti)}</strong>
      </div>
    </div>

    <!-- PODPIS -->
    <div class="inv-footer">
      <div class="inv-footer-left">V ${escH(d.mesto || '—')}, dne: ${fmtDate(inv.datum)}</div>
      <div class="inv-footer-right">
        <div class="inv-signature-name">${escH(d.jmeno)}</div>
        <div class="inv-signature-label">Vystavil: ${escH(d.jmeno)}</div>
      </div>
    </div>
  `;

  document.getElementById('preview-pane').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── TISK ──────────────────────────────────────────────────────
let lastGeneratedInvoice = null;

function printInvoice() {
  if (!document.getElementById('invoice-output')) {
    alert('Nejprve vygenerujte náhled faktury.');
    return;
  }
  window.print();
}

// ── PRŮVODNÍ E-MAIL ───────────────────────────────────────────
function copyEmailText() {
  const inv = lastGeneratedInvoice;
  if (!inv) {
    alert('Nejprve vygenerujte fakturu.');
    return;
  }

  const d = inv.dodavatel || {};
  const jmeno = d.jmeno || 'Martin Šimkovič';

  const emailText = `Dobrý den,

v příloze zasílám fakturu č. ${inv.cislo} na částku ${fmtCzk(inv.castka)}.

Děkuji za spolupráci.

S pozdravem
${jmeno}`;

  navigator.clipboard.writeText(emailText).then(() => {
    showToast('E-mail zkopírován do schránky ✓', 'success');
    // Vizuální feedback na tlačítku
    const btn = document.getElementById('btn-email');
    const orig = btn.textContent;
    btn.textContent = '✓ Zkopírováno';
    setTimeout(() => { btn.innerHTML = '✉ Kopírovat průvodní e-mail'; }, 1800);
  }).catch(() => {
    // Fallback — select a copy
    const ta = document.createElement('textarea');
    ta.value = emailText;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('E-mail zkopírován do schránky ✓', 'success');
  });
}

// ── HISTORIE ──────────────────────────────────────────────────
function renderHistory() {
  const hist = getHistory();
  const list = document.getElementById('history-list');
  if (hist.length === 0) {
    list.innerHTML = '<div class="history-empty">Žádné faktury v historii.</div>';
    return;
  }
  list.innerHTML = hist.map(inv => `
    <div class="history-item" onclick="loadHistoryItem(${inv.id})">
      <div class="h-no">Faktura č. ${escH(inv.cislo)}</div>
      <div class="h-name">${escH(inv.zakNazev)}</div>
      <div class="h-amount">${fmtCzk(inv.castka)} · ${fmtDate(inv.datum)}</div>
    </div>
  `).join('');
}

function loadHistoryItem(id) {
  const inv = getHistory().find(h => h.id === id);
  if (!inv) return;
  renderInvoiceHTML(inv);
  lastGeneratedInvoice = inv;
  document.getElementById('btn-email').disabled = false;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-nova').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
}

function clearHistory() {
  if (!confirm('Opravdu smazat celou historii?')) return;
  localStorage.removeItem(LS.history);
  localStorage.removeItem(LS.counter);
  renderHistory();
}
</script>
