<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odkazy</title>

<!-- ============================================================
     ✏️  EDITACE — ZMĚŇ CO CHCEŠ ZDE
     ============================================================ -->
<script>
const CONFIG = {

  // Nadpis a podnadpis
  title: "Odkazy",

  // Barevné téma (změň dle libosti)
  theme: {
    bg:      "#0f0f13",       // Barva pozadí
    surface: "#18181f",       // Barva karet
    border:  "#2a2a38",       // Okraje
    accent:  "#7c6af7",       // Hlavní barva
    text:    "#e8e6f0",       // Text
    muted:   "#6b6880",       // Tlumený text
  },

  // ── SEKCE A ODKAZY ──────────────────────────────────────────
  sections: [
    {
      name: "🔥 CLL",
      links: [
        { label: "IWCLL Response",  url: "https://htmlpreview.github.io/?https://github.com/simkovicm/CLL-response/blob/main/index.html",  icon: "✦" },
        { label: "Rozpis chemoterapie",  url: "https://htmlpreview.github.io/?https://github.com/simkovicm/rozcestnik/blob/main/lecba-generator_v1.html",  icon: "♘" }
      ]
    },
    {
      name: "📰 Ostatní",
      links: [
        { label: "Faktury",  url: "https://htmlpreview.github.io/?https://github.com/simkovicm/rozcestnik/blob/b487935d2742a8efc00b108f68f4efb41e4f3780/faktura-generator%20(2).html",   icon: "◉" },
        { label: "GitHub",    url: "https://github.com/simkovicm/rozcestnik",     icon: "𖢥" },
        { label: "BBC",      url: "https://bbc.com",      icon: "◉" }
      ]
    },
    {
      name: "🛠️ Práce",
      links: [
        { label: "Gmail",    url: "https://mail.google.com",   icon: "✉" },
        { label: "Drive",    url: "https://drive.google.com",  icon: "△" },
      ]
    },
    {
      name: "🎮 Ostatní",
      links: [
        { label: "Spotify",  url: "https://spotify.com",  icon: "◎" },
      ]
    },
  ]
}
</script>
<!-- ============================================================
     KONEC EDITACE — dále už nic neměň
     ============================================================ -->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --border: #2a2a38;
    --accent: #7c6af7;
    --text: #e8e6f0;
    --muted: #6b6880;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, color-mix(in srgb, var(--accent) 18%, transparent), transparent);
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown .6s ease both;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    opacity: .85;
  }

h1 {
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 600;
  letter-spacing: -.01em;   /* volitelně — původní -.03em je dost výrazné */
  }




  /* ── GRID ── */
  .grid {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 24px;
  }

  /* ── SECTION ── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    animation: fadeUp .5s ease both;
  }

  .section-title {
    font-size: .7rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .links { display: flex; flex-direction: column; gap: 4px; }

  .link-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    font-size: .9rem;
    font-weight: 600;
    transition: background .15s, color .15s, transform .15s;
    cursor: pointer;
  }

  .link-item:hover {
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: #fff;
    transform: translateX(3px);
  }

  .link-icon {
    font-size: .8rem;
    color: var(--accent);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
    opacity: .85;
  }

  /* ── CLOCK ── */
  .clock {
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
    color: var(--muted);
    margin-top: 52px;
    letter-spacing: .08em;
    animation: fadeDown .6s .2s ease both;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <p class="subtitle" id="subtitle"></p>
  <h1 id="title"></h1>
</header>



<main class="grid" id="grid"></main>

<p class="clock" id="clock"></p>

<script>
  // Aplikuj téma
  const t = CONFIG.theme;
  document.documentElement.style.setProperty('--bg',      t.bg);
  document.documentElement.style.setProperty('--surface', t.surface);
  document.documentElement.style.setProperty('--border',  t.border);
  document.documentElement.style.setProperty('--accent',  t.accent);
  document.documentElement.style.setProperty('--text',    t.text);
  document.documentElement.style.setProperty('--muted',   t.muted);

  // Nadpis
  document.getElementById('title').textContent    = CONFIG.title;
  document.getElementById('subtitle').textContent = CONFIG.subtitle;

  // Vykresli sekce
  const grid = document.getElementById('grid');
  CONFIG.sections.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className = 'section';
    div.style.animationDelay = `${i * 0.07 + 0.15}s`;

    const heading = document.createElement('div');
    heading.className = 'section-title';
    heading.textContent = sec.name;
    div.appendChild(heading);

    const list = document.createElement('div');
    list.className = 'links';

    sec.links.forEach(link => {
      const a = document.createElement('a');
      a.className = 'link-item';
      a.href = link.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `<span class="link-icon">${link.icon}</span>${link.label}`;
      list.appendChild(a);
    });

    div.appendChild(list);
    grid.appendChild(div);
  });

</script>
</body>
</html>
