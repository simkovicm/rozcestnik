<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odkazy</title>

<script>
const CONFIG = {
  title: "Odkazy",
  subtitle: "",
  theme: {
    bg:      "#0f0f13",
    surface: "#18181f",
    border:  "#2a2a38",
    accent:  "#7c6af7",
    text:    "#e8e6f0",
    muted:   "#6b6880",
  },
  sections: [
    {
      name: "CLL",
      links: [
        { label: "Kalkulátory",           url: "https://htmlpreview.github.io/?https://github.com/simkovicm/rozcestnik/blob/main/kalkulatory.html", icon: "☂" },
        { label: "IWCLL Response",        url: "https://htmlpreview.github.io/?https://github.com/simkovicm/CLL-response/blob/main/index.html",    icon: "✦" },
        { label: "Krevní odběry",        url: "https://htmlpreview.github.io/?https://github.com/simkovicm/rozcestnik/blob/main/krevni_odbery.html",    icon: "*" },
        { label: "Rozpis chemoterapie",   url: "https://htmlpreview.github.io/?https://github.com/simkovicm/rozcestnik/blob/main/lecba-generator_v1.html", icon: "*" }
      ]
    },
    {
      name: "Ostatní",
      links: [
        { label: "Faktury",              url: "https://htmlpreview.github.io/?https://github.com/simkovicm/rozcestnik/blob/b487935d2742a8efc00b108f68f4efb41e4f3780/faktura-generator%20(2).html", icon: "◉" },
        { label: "Generátor ICS",        url: "https://htmlpreview.github.io/?https://github.com/simkovicm/rozcestnik/blob/main/generator_ics_v2.html", icon: "📅" },
        { label: "Laboratorní příručky", url: "https://www.fnhk.cz/laboratorni-prirucky", icon: "*" },
        { label: "Seznam metod UKBD",    url: "https://www.fnhk.cz/ukbd/seznam-metod",   icon: "*" },
        { label: "GitHub",               url: "https://github.com/simkovicm/rozcestnik",  icon: "*" }
      ]
    },
    {
      name: "Práce",
      links: [
        { label: "Gmail",  url: "https://mail.google.com",  icon: "✉" },
        { label: "Drive",  url: "https://drive.google.com", icon: "△" },
      ]
    },
    {
      name: "Jiné",
      links: [
        { label: "Spotify", url: "https://spotify.com", icon: "◎" },
      ]
    },
  ]
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #1b2a47;
    --navy-dk: #142038;
    --blue:    #2e5fa3;
    --blue-lt: #4a7ecb;
    --teal:    #5ba3c9;
    --text:    #e8edf5;
    --muted:   #9bacc4;
    --border:  rgba(255,255,255,0.12);
    --surface: rgba(255,255,255,0.06);
  }

  html, body {
    min-height: 100vh;
    background: var(--navy-dk);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--navy-dk);
    border-bottom: 1px solid var(--border);
    padding: 18px 48px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-logo {
    width: 38px;
    height: 38px;
    border: 2px solid var(--teal);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--teal);
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text);
    line-height: 1.2;
  }

  .topbar-sub {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 1px;
  }

  /* ── CLOCK BAR ── */
  .clockbar {
    background: rgba(0,0,0,0.25);
    padding: 6px 48px;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    text-align: right;
  }

  /* ── SEARCH HERO ── */
  .search-hero {
    display: flex;
    justify-content: center;
    padding: 36px 48px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
  }

  .search-wrap {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(91,163,201,0.35);
    border-radius: 8px;
    padding: 12px 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-wrap:focus-within {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(91,163,201,0.12);
  }

  .search-icon {
    color: var(--teal);
    font-size: 1.1rem;
    flex-shrink: 0;
    opacity: 0.8;
  }

  .search-wrap input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1rem;
    width: 100%;
    letter-spacing: 0.01em;
  }

  .search-wrap input::placeholder {
    color: var(--muted);
    font-weight: 400;
  }

  .search-clear {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    pointer-events: none;
  }

  .search-clear.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .search-clear:hover { color: var(--text); }

  /* ── MAIN LAYOUT ── */
  main {
    padding: 40px 48px 64px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0;
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }

  /* ── SECTION ── */
  .section {
    padding: 28px 28px 24px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.4s ease both;
  }

  .section-title {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '›';
    font-size: 0.9rem;
    opacity: 0.5;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 7px 0;
    text-decoration: none;
    color: var(--text);
    font-size: 0.92rem;
    font-weight: 600;
    border-bottom: 1px solid transparent;
    transition: color 0.15s, padding-left 0.15s;
    position: relative;
  }

  .link-item::before {
    content: '';
    display: inline-block;
    width: 0;
    height: 1px;
    background: var(--teal);
    margin-right: 0;
    transition: width 0.2s, margin-right 0.2s;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .link-item:hover { color: var(--teal); }
  .link-item:hover::before { width: 14px; margin-right: 8px; }

  .link-icon { display: none; }

  /* ── NO RESULTS ── */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    padding: 40px 0;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .topbar { padding: 14px 20px; }
    .search-hero { padding: 20px 16px; }
    main { padding: 24px 20px 48px; }
    .clockbar { padding: 6px 20px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">M</div>
  <div>
    <div class="topbar-title" id="title"></div>
    <div class="topbar-sub" id="subtitle">Navigace</div>
  </div>
</div>

<!-- Centrální vyhledávání -->
<div class="search-hero">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Hledat odkaz…" autocomplete="off" spellcheck="false" autofocus>
    <button class="search-clear" id="search-clear" title="Vymazat">✕</button>
  </div>
</div>

<div class="clockbar" id="clock"></div>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>
  document.getElementById('title').textContent = CONFIG.title;
  if (CONFIG.subtitle) document.getElementById('subtitle').textContent = CONFIG.subtitle;

  const grid = document.getElementById('grid');

  function renderSections(sections) {
    grid.innerHTML = '';
    sections.forEach((sec, i) => {
      const div = document.createElement('div');
      div.className = 'section';
      div.style.animationDelay = `${i * 0.07}s`;
      div.dataset.section = sec.name.toLowerCase();

      const heading = document.createElement('div');
      heading.className = 'section-title';
      heading.textContent = sec.name;
      div.appendChild(heading);

      const list = document.createElement('div');
      list.className = 'links';

      sec.links.forEach(link => {
        const a = document.createElement('a');
        a.className = 'link-item';
        a.href = link.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.innerHTML = `<span class="link-icon">${link.icon}</span>${link.label}`;
        list.appendChild(a);
      });

      div.appendChild(list);
      grid.appendChild(div);
    });
  }

  renderSections(CONFIG.sections);

  // Vyhledávání
  const searchInput = document.getElementById('search');
  const searchClear = document.getElementById('search-clear');

  searchInput.addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    searchClear.classList.toggle('visible', q.length > 0);
    let anyVisible = false;

    document.querySelectorAll('.section').forEach(section => {
      const items = section.querySelectorAll('.link-item');
      let sectionVisible = false;
      items.forEach(item => {
        const match = !q || item.textContent.toLowerCase().includes(q);
        item.style.display = match ? '' : 'none';
        if (match) sectionVisible = true;
      });
      section.style.display = sectionVisible ? '' : 'none';
      if (sectionVisible) anyVisible = true;
    });

    let noRes = document.getElementById('no-results');
    if (!anyVisible && q) {
      if (!noRes) {
        noRes = document.createElement('div');
        noRes.id = 'no-results';
        noRes.className = 'no-results';
        noRes.textContent = 'Žádné výsledky.';
        grid.appendChild(noRes);
      }
    } else if (noRes) {
      noRes.remove();
    }
  });

  searchClear.addEventListener('click', function () {
    searchInput.value = '';
    searchInput.dispatchEvent(new Event('input'));
    searchInput.focus();
  });

  // Hodiny
  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('cs-CZ');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Fokus na vyhledávání při načtení stránky
  window.addEventListener('load', () => searchInput.focus());
</script>
</body>
</html>
